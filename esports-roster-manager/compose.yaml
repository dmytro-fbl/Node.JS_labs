services:
  mongo:
    image: mongo:8
    container_name: local-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: esports-roster
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
  app:
    build: .
    container_name: my-app
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin@mongo:27017/esports-roster?authSource=admin
volumes:
  mongo-data: