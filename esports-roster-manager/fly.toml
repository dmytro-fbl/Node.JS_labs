app = 'esports-roster-manager-ERROR-TEST'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 9999
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "5s"
  interval = "10s"
  timeout = "2s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024