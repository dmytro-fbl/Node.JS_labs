# fly.toml app configuration file generated for esports-roster-manager on 2026-04-26T21:48:59+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'esports-roster-manager'
primary_region = 'fra'

[build]


[[http_service.checks]]
  grace_period = "10s"
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/health"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
